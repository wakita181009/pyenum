name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-test:
    name: cargo test (${{ matrix.os }} / py${{ matrix.python }} / pyo3 ${{ matrix.pyo3 }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pyo3: ["0_25", "0_26", "0_27", "0_28"]
        exclude:
          # Keep matrix bounded: only run all PyO3 versions on Linux + 3.12.
          # macOS / Windows and non-3.12 Python only cover the default 0.28.
          - { os: macos-latest, pyo3: "0_25" }
          - { os: macos-latest, pyo3: "0_26" }
          - { os: macos-latest, pyo3: "0_27" }
          - { os: windows-latest, pyo3: "0_25" }
          - { os: windows-latest, pyo3: "0_26" }
          - { os: windows-latest, pyo3: "0_27" }
          - { os: ubuntu-latest, python: "3.10", pyo3: "0_25" }
          - { os: ubuntu-latest, python: "3.10", pyo3: "0_26" }
          - { os: ubuntu-latest, python: "3.10", pyo3: "0_27" }
          - { os: ubuntu-latest, python: "3.11", pyo3: "0_25" }
          - { os: ubuntu-latest, python: "3.11", pyo3: "0_26" }
          - { os: ubuntu-latest, python: "3.11", pyo3: "0_27" }
          - { os: ubuntu-latest, python: "3.13", pyo3: "0_25" }
          - { os: ubuntu-latest, python: "3.13", pyo3: "0_26" }
          - { os: ubuntu-latest, python: "3.13", pyo3: "0_27" }
          - { os: ubuntu-latest, python: "3.14", pyo3: "0_25" }
          - { os: ubuntu-latest, python: "3.14", pyo3: "0_26" }
          - { os: ubuntu-latest, python: "3.14", pyo3: "0_27" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-py${{ matrix.python }}-pyo3-${{ matrix.pyo3 }}
      - name: cargo test
        run: >-
          cargo test --workspace --all-targets
          --no-default-features --features pyo3-${{ matrix.pyo3 }}
      - name: doctests
        run: >-
          cargo test --workspace --doc
          --no-default-features --features pyo3-${{ matrix.pyo3 }}

  trybuild:
    name: trybuild (compile-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: trybuild
      - run: cargo test -p pyenum-derive --test trybuild

  python-integration:
    name: python integration (py${{ matrix.python }} / pyo3 ${{ matrix.pyo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pyo3: ["0_25", "0_26", "0_27", "0_28"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: pyintegration-py${{ matrix.python }}-pyo3-${{ matrix.pyo3 }}
      - name: install maturin & test deps
        run: pip install maturin pytest pydantic fastapi sqlalchemy
      - name: build & install extension
        working-directory: python
        run: >-
          maturin develop --release
          --features pyo3-${{ matrix.pyo3 }}
      - name: pytest
        working-directory: python
        run: pytest -q

  coverage:
    name: coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: llvm-cov
        run: >-
          cargo llvm-cov --workspace
          --no-default-features --features pyo3-0_28
          --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
