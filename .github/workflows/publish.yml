name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run publish steps in dry-run mode (no upload)"
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # PyPI trusted publishing

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --features pyo3-0_28 -- -D warnings
      - run: cargo test --workspace --features pyo3-0_28

  crates-io:
    name: publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: dry-run (pyenum-derive)
        run: cargo publish -p pyenum-derive --dry-run
      - name: dry-run (pyenum)
        run: cargo publish -p pyenum --dry-run --allow-dirty
      - name: publish pyenum-derive
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p pyenum-derive
      - name: wait for crates.io index
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: sleep 30
      - name: publish pyenum
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p pyenum

  build-wheels:
    name: build wheels (${{ matrix.target.runner }} / ${{ matrix.target.arch }})
    needs: verify
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { runner: ubuntu-latest, arch: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, arch: aarch64, manylinux: auto }
          - { runner: macos-latest, arch: x86_64, manylinux: "" }
          - { runner: macos-latest, arch: aarch64, manylinux: "" }
          - { runner: windows-latest, arch: x64, manylinux: "" }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target.arch }}
          manylinux: ${{ matrix.target.manylinux }}
          args: --release --out dist --features pyo3-0_28 -i 3.10 3.11 3.12 3.13 3.14
      - name: build sdist (linux/x86_64 only)
        if: matrix.target.runner == 'ubuntu-latest' && matrix.target.arch == 'x86_64'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target.runner }}-${{ matrix.target.arch }}
          path: python/dist/*

  pypi:
    name: publish to PyPI
    needs: build-wheels
    if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyenum
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: publish via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: create GitHub release
    needs: [crates-io, pypi]
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
